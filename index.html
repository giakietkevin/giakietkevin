<a class="font-label-caps text-label-caps text-on-primary-container hover:text-secondary-fixed transition-colors opacity-80 hover:opacity-100" href="#">Privacy</a>

<script>
        const BASE_RATES = {
            1: 1.00, 2: 0.81, 3: 0.64, 4: 0.50, 5: 0.26,
            6: 0.15, 7: 0.07, 8: 0.04, 9: 0.03, 10: 0.02,
            11: 0.01, 12: 0.007, 13: 0.005
        };

        const state = {
            mainLevel: 5,
            fodderLevel: 3,
            fFactor: 0.65,
            streak: []
        };

        const DOM = {
            mainSelect: document.getElementById('mainLevel'),
            fodderSelect: document.getElementById('fodderLevel'),
            fSlider: document.getElementById('fFactor'),
            fDisplay: document.getElementById('fFactorDisplay'),
            streakContainer: document.getElementById('streakContainer'),
            btnFail: document.getElementById('btnFail'),
            btnSuccess: document.getElementById('btnSuccess'),
            btnReset: document.getElementById('resetBtn'),
            baseDisplay: document.getElementById('baseRateDisplay'),
            estDisplay: document.getElementById('estRateDisplay'),
            recBox: document.getElementById('recommendationBox'),
            recIcon: document.getElementById('recommendationIcon'),
            recText: document.getElementById('recommendationText')
        };

        function loadState() {
            const saved = localStorage.getItem('fco_calc_state');
            if (saved) {
                const parsed = JSON.parse(saved);
                state.mainLevel = parsed.mainLevel !== undefined ? parsed.mainLevel : 5;
                state.fodderLevel = parsed.fodderLevel !== undefined ? parsed.fodderLevel : 3;
                state.fFactor = parsed.fFactor !== undefined ? parsed.fFactor : 0.65;
                state.streak = parsed.streak || [];
                DOM.mainSelect.value = state.mainLevel;
                DOM.fodderSelect.value = state.fodderLevel;
                DOM.fSlider.value = state.fFactor;
                DOM.fDisplay.textContent = state.fFactor.toFixed(2);
            }
        }

        function saveState() {
            localStorage.setItem('fco_calc_state', JSON.stringify(state));
        }

        function renderStreak() {
            DOM.streakContainer.innerHTML = '';
            if (state.streak.length === 0) {
                DOM.streakContainer.innerHTML = '<span class="text-on-surface-variant font-body-md text-body-md italic opacity-50">Chưa có dữ liệu mồi...</span>';
                return;
            }

            state.streak.forEach(isSuccess => {
                const icon = document.createElement('span');
                icon.className = 'material-symbols-outlined flex items-center justify-center w-[32px] h-[32px] rounded-full border border-outline-variant bg-surface-container-highest streak-icon-enter';
                icon.style.fontVariationSettings = "'FILL' 1";
                if (isSuccess) {
                    icon.textContent = 'check_circle';
                    icon.classList.add('text-secondary-fixed-dim');
                } else {
                    icon.textContent = 'cancel';
                    icon.classList.add('text-error');
                }
                DOM.streakContainer.appendChild(icon);
            });
        }

        function calculateProbability() {
            const P_main = BASE_RATES[state.mainLevel] || 0.005;
            const P_fodder = BASE_RATES[state.fodderLevel] || 0.5;

            let k = 0;
            for (let i = state.streak.length - 1; i >= 0; i--) {
                if (!state.streak[i]) k++;
                else break;
            }

            let P_est = P_main;
            if (k > 0) {
                P_est = P_main + ((1 - P_main) * (1 - Math.pow(P_fodder, k)) * state.fFactor);
            }

            P_est = Math.min(P_est, 1.0);

            DOM.baseDisplay.textContent = (P_main * 100).toFixed(2) + '%';
            DOM.estDisplay.textContent = (P_est * 100).toFixed(2) + '%';

            // Trigger pulse animation
            DOM.estDisplay.classList.remove('prob-pulse');
            void DOM.estDisplay.offsetWidth; // force reflow
            DOM.estDisplay.classList.add('prob-pulse');

            // Threshold classification:
            // >= 70%: DAP NGAY
            // 40% - 69.99%: CAN NHAC
            // < 40%: MOI TIEP
            if (P_est >= 0.70) {
                DOM.recText.textContent = 'Khuyên dùng: ĐẬP NGAY! KHUNG GIỜ VÀNG!';
                DOM.recIcon.textContent = 'local_fire_department';
                DOM.recIcon.className = 'material-symbols-outlined text-secondary-fixed-dim animate-pulse';
                DOM.recBox.className = 'z-10 bg-secondary-fixed-dim/10 border border-secondary-fixed-dim/50 rounded-lg px-lg py-sm flex items-center gap-sm mt-sm transition-all duration-300';

                DOM.estDisplay.classList.add('glow-text-green');
                DOM.estDisplay.classList.remove('glow-text-amber', 'text-on-surface');
            } else if (P_est >= 0.40) {
                DOM.recText.textContent = 'Khuyên dùng: CÂN NHẮC! Có thể thử nghiệm';
                DOM.recIcon.textContent = 'warning';
                DOM.recIcon.className = 'material-symbols-outlined text-amber-500';
                DOM.recBox.className = 'z-10 bg-amber-500/10 border border-amber-500/50 rounded-lg px-lg py-sm flex items-center gap-sm mt-sm transition-all duration-300';

                DOM.estDisplay.classList.add('glow-text-amber');
                DOM.estDisplay.classList.remove('glow-text-green', 'text-on-surface');
            } else {
                DOM.recText.textContent = 'Khuyên dùng: MỒI TIẾP ĐI! Chưa đủ tỉ lệ';
                DOM.recIcon.textContent = 'hourglass_top';
                DOM.recIcon.className = 'material-symbols-outlined text-on-surface-variant';
                DOM.recBox.className = 'z-10 bg-surface-container-highest border border-outline-variant rounded-lg px-lg py-sm flex items-center gap-sm mt-sm transition-all duration-300';

                DOM.estDisplay.classList.add('text-on-surface');
                DOM.estDisplay.classList.remove('glow-text-green', 'glow-text-amber');
            }
        }

        function update() {
            renderStreak();
            calculateProbability();
            saveState();
        }

        DOM.mainSelect.addEventListener('change', (e) => { state.mainLevel = parseInt(e.target.value); update(); });
        DOM.fodderSelect.addEventListener('change', (e) => { state.fodderLevel = parseInt(e.target.value); update(); });

        DOM.fSlider.addEventListener('input', (e) => {
            state.fFactor = parseFloat(e.target.value);
            DOM.fDisplay.textContent = state.fFactor.toFixed(2);
            update();
        });

        DOM.btnFail.addEventListener('click', () => {
            if(state.streak.length > 29) state.streak.shift();
            state.streak.push(false);
            update();
        });

        DOM.btnSuccess.addEventListener('click', () => {
            if(state.streak.length > 29) state.streak.shift();
            state.streak.push(true);
            update();
        });

        DOM.btnReset.addEventListener('click', () => { state.streak = []; update(); });

        loadState();
        update();
    </script>
</body></html>
